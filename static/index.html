<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoPhotoTagger</title>
    <!-- Inter font — same CDN import as dedup-photos -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <!-- Feather Icons — same icon library as dedup-photos -->
    <script src="https://unpkg.com/feather-icons"></script>
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/layout.css">
    <link rel="stylesheet" href="/css/table.css">
    <link rel="stylesheet" href="/css/components.css">
</head>
<body>
    <div class="app-layout">

        <!-- ZONE A — Top Bar (full width) -->
        <header class="topbar">
            <!-- Row 1: Target folder + action buttons -->
            <div class="topbar-row">
                <span class="app-title">GeoPhotoTagger</span>
                <input id="target-folder-path" class="folder-input"
                       type="text" placeholder="Target folder (photos without GPS)..." readonly>
                <button id="btn-browse" class="btn btn-primary">Browse</button>
                <button id="btn-add-reference" class="btn btn-secondary">+ Reference</button>
                <button id="btn-import-track" class="btn btn-secondary">Import Track</button>
            </div>
            <!-- Row 2: Match controls -->
            <div class="topbar-row">
                <button id="btn-match-all" class="btn btn-accent">Match All</button>
                <span class="label-small">Max delta:</span>
                <button class="btn btn-sm btn-secondary threshold-btn" data-minutes="10">10 min</button>
                <button class="btn btn-sm btn-secondary threshold-btn active" data-minutes="30">30 min</button>
                <button class="btn btn-sm btn-secondary threshold-btn" data-minutes="60">60 min</button>
                <span id="scan-indicator" class="scan-indicator hidden">Scanning&#8230;</span>
            </div>
            <!-- Row 3: Reference folders list -->
            <div id="reference-list-row" class="topbar-row track-list-row">
                <span class="label-small">References:</span>
                <div id="reference-list" class="chip-list">
                    <span class="muted small">No reference folders added</span>
                </div>
            </div>
            <!-- Row 4: GPS track files list -->
            <div id="track-list-row" class="topbar-row track-list-row">
                <span class="label-small">GPS Tracks:</span>
                <div id="track-list" class="chip-list">
                    <span class="muted small">No GPS tracks imported</span>
                </div>
            </div>
        </header>

        <!-- ZONE B — Target Photos (left panel ~45%) -->
        <main class="target-panel">
            <div id="target-table-container">
                <p class="muted panel-placeholder">Browse to a folder to scan for photos without GPS coordinates.</p>
            </div>
        </main>

        <!-- ZONE C — Match Details (right panel ~55%) -->
        <aside class="match-panel">
            <p class="muted panel-placeholder">Select a photo from the list to see match details.</p>
        </aside>

        <!-- Status Bar -->
        <footer class="statusbar">
            <span id="status-bar-text">Ready &#8212; select a target folder to begin</span>
        </footer>

    </div>
    <script type="module" src="/js/app.js"></script>
</body>
</html>
