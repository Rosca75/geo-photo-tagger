<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoPhotoTagger</title>
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/layout.css">
    <link rel="stylesheet" href="/css/table.css">
    <link rel="stylesheet" href="/css/components.css">
</head>
<body>
    <div class="app-layout">

        <!-- ZONE A — Top Bar (full width) -->
        <header class="topbar">
            <div class="topbar-row">
                <span class="app-title">GeoPhotoTagger</span>
                <input id="target-folder-path" class="folder-input"
                       type="text" placeholder="Target folder (photos without GPS)..." readonly>
                <button id="btn-browse" class="btn btn-primary">Browse</button>
                <button class="btn btn-secondary" disabled title="Available in Phase 2">+ Reference</button>
                <button class="btn btn-secondary" disabled title="Available in Phase 3">Import Track</button>
                <button class="btn btn-accent" disabled title="Available in Phase 4">Match All</button>
            </div>
            <div class="topbar-row">
                <span id="scan-indicator" class="scan-indicator hidden">Scanning...</span>
            </div>
        </header>

        <!-- ZONE B — Target Photos (left panel ~45%) -->
        <main class="target-panel">
            <div id="target-table-container">
                <p class="muted panel-placeholder">Browse to a folder to scan for photos without GPS coordinates.</p>
            </div>
        </main>

        <!-- ZONE C — Match Details (right panel ~55%) -->
        <aside class="match-panel">
            <p class="muted panel-placeholder">Select a photo from the list to see match details.</p>
        </aside>

        <!-- Status Bar -->
        <footer class="statusbar">
            <span id="status-bar-text">Ready — select a target folder to begin</span>
        </footer>

    </div>
    <script type="module" src="/js/app.js"></script>
</body>
</html>
