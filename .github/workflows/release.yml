name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: windows/amd64
            artifact: geo-photo-tagger-windows-amd64.exe
            build_path: build/bin/geo-photo-tagger.exe
            tags: ""
          - os: ubuntu-latest
            platform: linux/amd64
            artifact: geo-photo-tagger-linux-amd64
            build_path: build/bin/geo-photo-tagger
            tags: "-tags webkit2_41"

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev pkg-config

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Download Go modules
        run: go mod download

      - name: Build
        run: wails build ${{ matrix.tags }} -platform ${{ matrix.platform }}

      - name: Rename binary
        shell: bash
        run: cp "${{ matrix.build_path }}" "${{ matrix.artifact }}"

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}
          generate_release_notes: true
